name: Flutter iOS Fastlane workflow

# combined Material and Cupertino Fastlane Workflow

permissions:
  contents: write
  pull-requests: write
  id-token: write

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "flutter_obdii/**"
      - ".github/workflows/caller_flutter.yml"

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-beta:
    name: Deploy Flutter to TestFlight
    runs-on: macos-26
    timeout-minutes: 45
    env:
      CURRENT_BRANCH: ${{ github.ref_name }}
      APP_ID: ${{ vars.APP_ID }}
      #APP_IDENTIFIER: com.rheosoft.obdiif

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Select Xcode
        run: /usr/bin/xcodebuild -version

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Bitwarden Secrets Manager CLI (bws)
        run: |
          BWS_VERSION="1.0.0"
          curl -L -o bws.zip "https://github.com/bitwarden/sdk/releases/download/bws-v${BWS_VERSION}/bws-aarch64-apple-darwin-${BWS_VERSION}.zip"
          unzip -q bws.zip -d /usr/local/bin
          chmod +x /usr/local/bin/bws
          bws --version

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Install Fastlane dependencies
        run: |
          bundle install

      - name: Install CocoaPods for Bundler Ruby
        run: |
          bundle install
          which ruby
          ruby -v
          bundle exec pod --version

      - name: Pod install sanity check
        working-directory: flutter_obdii/ios
        run: |
          if [ -f Podfile ]; then
            bundle exec pod repo update
            bundle exec pod install
          else
            echo "No Podfile present in flutter_obdii/ios; skipping pod install."
          fi

      - name: Bump Flutter version from pubspec
        id: bump_version
        working-directory: flutter_obdii
        run: |
          python3 - <<'PY'
          import pathlib, re, sys

          path = pathlib.Path("pubspec.yaml")
          text = path.read_text(encoding="utf-8")
          m = re.search(r"^version:\s*(\d+)\.(\d+)\.(\d+)\+(\d+)\s*$", text, re.MULTILINE)
          if not m:
            print("Could not parse pubspec version line", file=sys.stderr)
            sys.exit(1)

          major, minor, patch, build = map(int, m.groups())
          new_minor = minor
          new_patch = patch + 1
          new_build = build + 1
          new_version = f"{major}.{new_minor}.{new_patch}+{new_build}"
          updated = re.sub(r"^version:\s*.*$", f"version: {new_version}", text, count=1, flags=re.MULTILINE)
          path.write_text(updated, encoding="utf-8")

          with open(pathlib.Path("../.github_version_env"), "w", encoding="utf-8") as f:
            f.write(f"FLUTTER_BUILD_NAME={major}.{new_minor}.{new_patch}\n")
            f.write(f"FLUTTER_BUILD_NUMBER={new_build}\n")
            f.write(f"PUBSPEC_VERSION={new_version}\n")
          PY
          cat ../.github_version_env >> "$GITHUB_ENV"

      - name: Commit bumped pubspec version
        if: github.event_name == 'push'
        run: |
          git add flutter_obdii/pubspec.yaml
          git commit -m "ci: bump flutter version to ${PUBSPEC_VERSION} [skip ci]" || echo "No version changes to commit"
          git push origin HEAD:${{ github.ref_name }}

      - name: Flutter pub get
        working-directory: flutter_obdii
        run: flutter pub get

      - name: Flutter analyze
        working-directory: flutter_obdii
        run: flutter analyze

      #- name: Flutter tests
      #  working-directory: flutter_obdii
      #   run: flutter test

      - name: Build iOS Material (no codesign)
        if: ${{ false }} # Temporarily skipped; fastlane beta builds with target.
        working-directory: flutter_obdii
        run: flutter build ios --release --no-codesign -t lib/main_material.dart

      - name: Build iOS Cupertino (no codesign)
        if: ${{ false }} # Temporarily skipped; fastlane beta builds with target.
        working-directory: flutter_obdii
        run: flutter build ios --release --no-codesign -t lib/main_cupertino.dart

      - name: Prepare Fastlane config for Flutter iOS project
        working-directory: flutter_obdii/ios
        run: |
          mkdir -p fastlane
          cp ../../fastlane/Appfile fastlane/Appfile
          cp ../../fastlane/Matchfile fastlane/Matchfile
          ls fastlane
         # sed -i '' "s|^app_id = .*|app_id = ENV['APP_IDENTIFIER'] || \"com.rheosoft.#{ENV['PROJECT_NAME']}\"|" fastlane/Appfile

      - name: Run Fastlane beta lane (Material -> obdiif)
        working-directory: flutter_obdii/ios
        run: |
          set -euo pipefail
          echo "Running fastlane via bws for PROJECT_NAME=obdiif..."
          bws run --project-id 9c8584c2-a53a-45fb-a276-b3610119586a -- bundle exec fastlane beta
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
          PROJECT_NAME: obdiif

      - name: Run Fastlane beta lane (Cupertino -> obdiic)
        working-directory: flutter_obdii/ios
        run: |
          set -euo pipefail
          echo "Running fastlane via bws for PROJECT_NAME=obdiic..."
          bws run --project-id 9c8584c2-a53a-45fb-a276-b3610119586a -- bundle exec fastlane beta
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
          PROJECT_NAME: obdiic

      - name: Dump gym log on failure
        if: failure()
        run: |
          echo "=== gym log files ==="
          ls -la ~/Library/Logs/gym || true
          echo "=== latest gym log (tail) ==="
          LATEST_LOG=$(ls -t ~/Library/Logs/gym/*.log 2>/dev/null | head -n 1 || true)
          if [ -n "$LATEST_LOG" ]; then
            echo "Log: $LATEST_LOG"
            tail -n 300 "$LATEST_LOG" || true
          else
            echo "No gym log found."
          fi

      - name: Upload gym logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gym-logs
          path: ~/Library/Logs/gym/*.log
          if-no-files-found: warn
