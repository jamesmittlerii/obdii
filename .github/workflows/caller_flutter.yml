name: Flutter iOS Fastlane workflow

permissions:
  contents: write
  pull-requests: write
  id-token: write

on:
  workflow_dispatch:
  push:
    branches: ["flutter"]
    paths:
      - "flutter_obdii/**"
      - ".github/workflows/caller_flutter.yml"

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-beta:
    name: Deploy Flutter to TestFlight
    runs-on: macos-26
    timeout-minutes: 45
    env:
      CURRENT_BRANCH: ${{ github.ref_name }}
      APP_ID: ${{ vars.APP_ID }}
      PROJECT_NAME: Runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Select Xcode
        run: /usr/bin/xcodebuild -version

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Bitwarden Secrets Manager CLI (bws)
        run: |
          BWS_VERSION="1.0.0"
          curl -L -o bws.zip "https://github.com/bitwarden/sdk/releases/download/bws-v${BWS_VERSION}/bws-aarch64-apple-darwin-${BWS_VERSION}.zip"
          unzip -q bws.zip -d /usr/local/bin
          chmod +x /usr/local/bin/bws
          bws --version

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Install Fastlane dependencies
        run: bundle install

      - name: Flutter pub get
        working-directory: flutter_obdii
        run: flutter pub get

      - name: Flutter analyze
        working-directory: flutter_obdii
        run: flutter analyze

      - name: Flutter tests
        working-directory: flutter_obdii
        run: flutter test

      - name: Build iOS (no codesign)
        working-directory: flutter_obdii
        run: flutter build ios --release --no-codesign

      - name: Run Fastlane beta lane
        working-directory: flutter_obdii/ios
        run: bws run --project-id 9c8584c2-a53a-45fb-a276-b3610119586a -- bundle exec fastlane beta --fastfile ../../fastlane/Fastfile
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
