name: Flutter TestFlight Parallel Deployment

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  BWS_VERSION: "1.0.0"

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "flutter_obdii/**"
      - ".github/workflows/caller_flutter.yml"

concurrency:
  group: ${{ github.repository }}-ios-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # --- COMMON PREPARATION JOB ---
  prepare:
    name: Versioning & Dependencies
    runs-on: macos-26
    outputs:
      commit_sha: ${{ steps.capture_sha.outputs.commit_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Sync to latest branch head
        if: github.event_name == 'push'
        run: |
          git fetch origin "${{ github.ref_name }}"
          git checkout "${{ github.ref_name }}"
          git reset --hard "origin/${{ github.ref_name }}"

      - name: Bump Flutter version
        working-directory: flutter_obdii
        run: |
          python3 - <<'PY'
          import pathlib, re, sys
          path = pathlib.Path("pubspec.yaml")
          text = path.read_text(encoding="utf-8")
          m = re.search(r"^version:\s*(\d+)\.(\d+)\.(\d+)\+(\d+)\s*$", text, re.MULTILINE)
          if not m: sys.exit(1)
          major, minor, patch, build = map(int, m.groups())
          new_version = f"{major}.{minor}.{patch + 1}+{build + 1}"
          updated = re.sub(r"^version:\s*.*$", f"version: {new_version}", text, count=1, flags=re.MULTILINE)
          path.write_text(updated, encoding="utf-8")
          PY

      - name: Commit version bump
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add flutter_obdii/pubspec.yaml
          git commit -m "ci: bump version [skip ci]" || echo "No changes"
          git push origin HEAD:${{ github.ref_name }}

      - name: Capture SHA
        id: capture_sha
        run: echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  # --- PARALLEL DEPLOYMENT JOBS ---
  deploy:
    name: ${{ matrix.platform }} ${{ matrix.display_name }}
    needs: prepare
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        # This creates the 4 parallel combinations
        platform: [ios, macos]
        project: [obdiif, obdiic]
        include:
          - project: obdiif
            display_name: Material
          - project: obdiic
            display_name: Cupertino
    env:
      BWS_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
      PROJECT_NAME: ${{ matrix.project }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}

      # Common Tooling Setup (Required per-runner)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Prepare local bin path
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache Bitwarden BWS
        id: cache-bws
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/bws
          key: bws-${{ runner.os }}-${{ runner.arch }}-${{ env.BWS_VERSION }}

      - name: Install Bitwarden BWS
        if: steps.cache-bws.outputs.cache-hit != 'true'
        run: |
          curl -L -o bws.zip "https://github.com/bitwarden/sdk/releases/download/bws-v${{ env.BWS_VERSION }}/bws-aarch64-apple-darwin-${{ env.BWS_VERSION }}.zip"
          unzip -q bws.zip -d "$HOME/.local/bin"
          chmod +x "$HOME/.local/bin/bws"

      # Platform Specific Setup
      - name: Install Pods
        working-directory: flutter_obdii/${{ matrix.platform }}
        run: |
          if [ -f Podfile ]; then
            bundle exec pod repo update
            bundle exec pod install
          fi

      - name: Sync Fastlane Config
        working-directory: flutter_obdii/${{ matrix.platform }}
        run: |
          mkdir -p fastlane
          cp ../../fastlane/Appfile fastlane/Appfile
          cp ../../fastlane/Matchfile fastlane/Matchfile

      # Execution
      - name: Build & Upload to TestFlight
        working-directory: flutter_obdii/${{ matrix.platform }}
        run: |
          bws run --project-id 9c8584c2-a53a-45fb-a276-b3610119586a -- bundle exec fastlane beta

      # Failure Handling
      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gym-logs-${{ matrix.platform }}-${{ matrix.project }}
          path: ~/Library/Logs/gym/*.log

  windows_store_material:
    name: Windows Store Material
    if: true
    needs: prepare
    runs-on: windows-latest
    env:
      FLUTTER_TARGET: lib/main_material.dart
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: flutter_obdii
        run: flutter pub get

      - name: Build Windows release (Material)
        working-directory: flutter_obdii
        run: flutter build windows --release --target ${{ env.FLUTTER_TARGET }}

      - name: Sync MSIX version from pubspec version
        shell: pwsh
        working-directory: flutter_obdii
        run: |
          $pubspecPath = "pubspec.yaml"
          $content = Get-Content -Raw -Path $pubspecPath

          $versionMatch = [regex]::Match($content, '(?m)^version:\s*(\d+)\.(\d+)\.(\d+)\+(\d+)\s*$')
          if (-not $versionMatch.Success) {
            throw "Could not parse pubspec version from $pubspecPath"
          }

          # Microsoft Store requires the 4th segment (revision) to be 0.
          $msixVersion = "$($versionMatch.Groups[1].Value).$($versionMatch.Groups[2].Value).$($versionMatch.Groups[3].Value).0"
          $updated = [regex]::Replace($content, '(?m)^(\s*)msix_version:\s*.*$', "`${1}msix_version: $msixVersion", 1)
          if ($updated -eq $content) {
            throw "Could not find msix_version in $pubspecPath"
          }

          Set-Content -Path $pubspecPath -Value $updated
          Write-Host "Synced msix_version to $msixVersion"

      - name: Build MSIX upload package
        working-directory: flutter_obdii
        run: dart run msix:create --store --build-windows false

      - name: Locate MSIXUPLOAD
        id: msix
        shell: pwsh
        run: |
          $releaseDir = "flutter_obdii/build/windows/x64/runner/Release"
          $pkg = Get-ChildItem -Path $releaseDir -Include "*.msixupload","*.msix" -File -Recurse | Select-Object -First 1
          if (-not $pkg) { throw "No .msixupload or .msix package found in $releaseDir." }
          "path=$($pkg.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload Windows package artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-material-msixupload
          path: ${{ steps.msix.outputs.path }}

      - name: Setup Microsoft Store CLI
        uses: microsoft/microsoft-store-apppublisher@v1.1

      - name: Preflight Store secrets
        shell: pwsh
        env:
          AZURE_AD_TENANT_ID: ${{ secrets.AZURE_AD_TENANT_ID }}
          SELLER_ID: ${{ secrets.SELLER_ID }}
          AZURE_AD_APPLICATION_CLIENT_ID: ${{ secrets.AZURE_AD_APPLICATION_CLIENT_ID }}
          AZURE_AD_APPLICATION_SECRET: ${{ secrets.AZURE_AD_APPLICATION_SECRET }}
          MS_STORE_PRODUCT_ID: ${{ secrets.MS_STORE_PRODUCT_ID }}
        run: |
          $required = @(
            "AZURE_AD_TENANT_ID",
            "SELLER_ID",
            "AZURE_AD_APPLICATION_CLIENT_ID",
            "AZURE_AD_APPLICATION_SECRET",
            "MS_STORE_PRODUCT_ID"
          )
          $missing = @()
          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace((Get-Item "Env:$name" -ErrorAction SilentlyContinue).Value)) {
              $missing += $name
            }
          }
          if ($missing.Count -gt 0) {
            throw "Missing required GitHub secrets: $($missing -join ', ')"
          }
          Write-Host "All required Microsoft Store secrets are set."

      - name: Preflight msstore CLI
        shell: pwsh
        run: |
          msstore --version

      - name: Preflight package path
        shell: pwsh
        run: |
          $pkgPath = "${{ steps.msix.outputs.path }}"
          if (-not (Test-Path -LiteralPath $pkgPath)) {
            throw "Package not found at: $pkgPath"
          }
          Write-Host "Package ready: $pkgPath"

      - name: Configure Microsoft Store credentials
        shell: pwsh
        run: |
          msstore reconfigure `
            --tenantId "${{ secrets.AZURE_AD_TENANT_ID }}" `
            --sellerId "${{ secrets.SELLER_ID }}" `
            --clientId "${{ secrets.AZURE_AD_APPLICATION_CLIENT_ID }}" `
            --clientSecret "${{ secrets.AZURE_AD_APPLICATION_SECRET }}"

      - name: Clear existing Store draft submission
        shell: pwsh
        run: |
          msstore submission delete "${{ secrets.MS_STORE_PRODUCT_ID }}" --flight-id "9PNDRVKCKMF0" --no-confirm
        continue-on-error: true

      - name: Publish package to Microsoft Store (internal flight)
        shell: pwsh
        run: |
          msstore publish "${{ steps.msix.outputs.path }}" --flight-id "9PNDRVKCKMF0" -id "${{ secrets.MS_STORE_PRODUCT_ID }}"

  google_play_material:
    name: Google Play Material
    needs: prepare
    runs-on: ubuntu-latest
    env:
      FLUTTER_TARGET: lib/main_material.dart
      PLAY_TRACK: alpha
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: flutter_obdii
        run: flutter pub get

      - name: Preflight Play Store secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          missing=""
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_PASSWORD ANDROID_KEY_ALIAS GOOGLE_PLAY_SERVICE_ACCOUNT_JSON; do
            eval "val=\${$name}"
            if [ -z "$val" ]; then
              missing="$missing $name"
            fi
          done
          if [ -n "$missing" ]; then
            echo "Missing required GitHub secrets:$missing" >&2
            exit 1
          fi
          echo "All required Google Play secrets are set."

      - name: Decode Android upload keystore
        working-directory: flutter_obdii/android/app
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > upload-keystore.jks

      - name: Write key.properties
        working-directory: flutter_obdii/android
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          python3 <<'PY'
          import os
          path = "key.properties"
          with open(path, "w", encoding="utf-8") as f:
              f.write(f"storePassword={os.environ['STORE_PASSWORD']}\n")
              f.write(f"keyPassword={os.environ['KEY_PASSWORD']}\n")
              f.write(f"keyAlias={os.environ['KEY_ALIAS']}\n")
              f.write("storeFile=app/upload-keystore.jks\n")
          PY

      - name: Build Material release app bundle
        working-directory: flutter_obdii
        run: |
          flutter build appbundle --release --flavor material --target ${{ env.FLUTTER_TARGET }}

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.rheosoft.obdiif
          releaseFiles: flutter_obdii/build/app/outputs/bundle/materialRelease/app-material-release.aab
          track: ${{ env.PLAY_TRACK }}
          status: draft
