name: Deploy to Windows Store
permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  BWS_VERSION: "1.0.0"

on:
  workflow_dispatch:
 
concurrency:
  group: ${{ github.repository }}-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows_store_material:
    name: Windows Store Material
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    env:
      FLUTTER_TARGET: lib/main_material.dart
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true

      - name: Install dependencies
        working-directory: flutter_obdii
        run: flutter pub get

      - name: Run tests
        working-directory: flutter_obdii
        run: flutter test  # The workflow stops here if tests fail

      - name: Build Windows release (Material)
        working-directory: flutter_obdii
        run: flutter build windows --release --target ${{ env.FLUTTER_TARGET }}

      - name: Sync MSIX version from pubspec version
        shell: pwsh
        working-directory: flutter_obdii
        run: |
          $pubspecPath = "pubspec.yaml"
          $content = Get-Content -Raw -Path $pubspecPath

          $versionMatch = [regex]::Match($content, '(?m)^version:\s*(\d+)\.(\d+)\.(\d+)\+(\d+)\s*$')
          if (-not $versionMatch.Success) {
            throw "Could not parse pubspec version from $pubspecPath"
          }

          # MSIX needs a.b.c.d (each 0–65535). Map pubspec major.minor.patch+build → a.b.c.d (build = revision).
          $build = [int]$versionMatch.Groups[4].Value
          if ($build -gt 65535) { throw "pubspec +build ($build) exceeds MSIX max revision 65535" }
          $msixVersion = "$($versionMatch.Groups[1].Value).$($versionMatch.Groups[2].Value).$($versionMatch.Groups[3].Value).$build"
          $updated = [regex]::Replace($content, '(?m)^(\s*)msix_version:\s*.*$', "`${1}msix_version: $msixVersion", 1)
          if ($updated -eq $content) {
            throw "Could not find msix_version in $pubspecPath"
          }

          Set-Content -Path $pubspecPath -Value $updated
          Write-Host "Synced msix_version to $msixVersion"

      - name: Build MSIX upload package
        working-directory: flutter_obdii
        run: dart run msix:create --store --build-windows false

      - name: Locate MSIXUPLOAD
        id: msix
        shell: pwsh
        run: |
          $releaseDir = "flutter_obdii/build/windows/x64/runner/Release"
          $pkg = Get-ChildItem -Path $releaseDir -Include "*.msixupload","*.msix" -File -Recurse | Select-Object -First 1
          if (-not $pkg) { throw "No .msixupload or .msix package found in $releaseDir." }
          "path=$($pkg.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload Windows package artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-material-msixupload
          path: ${{ steps.msix.outputs.path }}

      - name: Setup Microsoft Store CLI
        uses: microsoft/microsoft-store-apppublisher@v1

      - name: Preflight Store secrets
        shell: pwsh
        env:
          AZURE_AD_TENANT_ID: ${{ secrets.AZURE_AD_TENANT_ID }}
          SELLER_ID: ${{ secrets.SELLER_ID }}
          AZURE_AD_APPLICATION_CLIENT_ID: ${{ secrets.AZURE_AD_APPLICATION_CLIENT_ID }}
          AZURE_AD_APPLICATION_SECRET: ${{ secrets.AZURE_AD_APPLICATION_SECRET }}
          MS_STORE_PRODUCT_ID: ${{ secrets.MS_STORE_PRODUCT_ID }}
        run: |
          $required = @(
            "AZURE_AD_TENANT_ID",
            "SELLER_ID",
            "AZURE_AD_APPLICATION_CLIENT_ID",
            "AZURE_AD_APPLICATION_SECRET",
            "MS_STORE_PRODUCT_ID"
          )
          $missing = @()
          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace((Get-Item "Env:$name" -ErrorAction SilentlyContinue).Value)) {
              $missing += $name
            }
          }
          if ($missing.Count -gt 0) {
            throw "Missing required GitHub secrets: $($missing -join ', ')"
          }
          Write-Host "All required Microsoft Store secrets are set."

      - name: Preflight msstore CLI
        shell: pwsh
        run: msstore --version

      - name: Preflight package path
        shell: pwsh
        run: |
          $pkgPath = "${{ steps.msix.outputs.path }}"
          if (-not (Test-Path -LiteralPath $pkgPath)) {
            throw "Package not found at: $pkgPath"
          }
          Write-Host "Package ready: $pkgPath"

      - name: Configure Microsoft Store credentials
        shell: pwsh
        run: |
          msstore reconfigure `
            --tenantId "${{ secrets.AZURE_AD_TENANT_ID }}" `
            --sellerId "${{ secrets.SELLER_ID }}" `
            --clientId "${{ secrets.AZURE_AD_APPLICATION_CLIENT_ID }}" `
            --clientSecret "${{ secrets.AZURE_AD_APPLICATION_SECRET }}"

      - name: Publish package to Microsoft Store (internal flight)
        shell: pwsh
        run: |
          msstore publish "${{ steps.msix.outputs.path }}" --flightId "f02525fd-3718-40e0-b657-bf60db9af138" -id "${{ secrets.MS_STORE_PRODUCT_ID }}"

  
