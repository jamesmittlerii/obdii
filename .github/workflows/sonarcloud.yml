name: SonarCloud

permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.repository }}-release-${{ github.ref }}
  cancel-in-progress: false
  
jobs:
  scan:
    name: Test Coverage & Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }} # Required for private submodules

      - name: Checkout SwiftOBD2
        uses: actions/checkout@v5
        with:
          repository: jamesmittlerii/SwiftOBD2
          ref: main
          path: SwiftOBD2

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true

      - name: Install Flutter dependencies
        working-directory: flutter_obdii
        run: flutter pub get

      - name: Generate Flutter coverage
        working-directory: flutter_obdii
        run: flutter test --coverage

      - name: Make Kotlin Gradle wrapper executable
        working-directory: kotlin_obdii
        run: chmod +x gradlew

      - name: Generate Kotlin JaCoCo coverage
        working-directory: kotlin_obdii
        env:
          KOTLINOBD2_DIR: ${{ github.workspace }}/SwiftOBD2/kotlinobd2
        run: ./gradlew :coreApp:test :coreApp:jacocoTestReport

      - name: Enable KVM for Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Generate Android UI coverage
        uses: reactivecircus/android-emulator-runner@v2
        env:
          KOTLINOBD2_DIR: ${{ github.workspace }}/SwiftOBD2/kotlinobd2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          disable-animations: true
          script: cd kotlin_obdii && ./gradlew :androidApp:createDebugCoverageReport

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
