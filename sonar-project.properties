sonar.organization=jamesmittlerii
sonar.projectKey=jamesmittlerii_obdii
sonar.host.url=https://sonarcloud.io

# Sources
sonar.sources=flutter_obdii/lib,kotlin_obdii/app/src/main,kotlin_obdii/androidApp/src/main,obdii

# Tests
sonar.tests=flutter_obdii/test,kotlin_obdii/app/src/test,kotlin_obdii/androidApp/src/androidTest,test

# Coverage paths for local/manual scans. CI overrides these via scripts/prepare-sonar-scanner-args.sh
# so Kotlin-only (or Flutter/Swift-only) pushes do not import missing or stale reports.
sonar.dart.lcov.reportPaths=flutter_obdii/coverage/lcov.info
sonar.java.coveragePlugin=jacoco
sonar.coverage.jacoco.xmlReportPaths=kotlin_obdii/app/build/reports/jacoco/test/jacocoTestReport.xml,kotlin_obdii/androidApp/build/reports/coverage/androidTest/debug/connected/report.xml
sonar.coverageReportPaths=coverage-swift/sonarqube-generic-coverage.xml

# Android platform integrations depend on BLE/car hardware and are not practical to unit test.
sonar.coverage.exclusions=kotlin_obdii/androidApp/src/main/java/com/rheosoft/obdii/android/ble/**,kotlin_obdii/androidApp/src/main/java/com/rheosoft/obdii/android/car/**,obdii/Assets.xcassets/**,obdii/Main.storyboard/**,obdii/LaunchScreen.storyboard/**,obdii/carplay/**
